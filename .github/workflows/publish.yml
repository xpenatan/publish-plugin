name: Publish

on:
  workflow_call:
    inputs:
      gradle_task:
        description: Gradle publishing task to run
        required: true
        type: string
    secrets:
      CENTRAL_PORTAL_USERNAME:
        required: true
      CENTRAL_PORTAL_PASSWORD:
        required: true
      PGP_SECRET:
        required: true
      PGP_PASSPHRASE:
        required: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish Maven artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.PGP_SECRET }}
      SIGNING_PASSWORD: ${{ secrets.PGP_PASSPHRASE }}
      GRADLE_TASK: ${{ inputs.gradle_task }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Test and publish
        run: ./gradlew check "$GRADLE_TASK" --stacktrace --no-daemon
